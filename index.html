<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#121220">
  
  <!-- SEO & Social Meta Tags -->
  <title>AiNotes — Ghi âm & Phiên âm AI thông minh</title>
  <meta name="description" content="Trình ghi âm cao cấp kết hợp phiên âm giọng nói và phân tích nội dung cuộc họp tự động bằng AI.">
  <meta name="keywords" content="ghi âm, phiên âm, whisper, openai, ai notes, meeting notes, action items">
  
  <!-- Stylesheets -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>

  <!-- Main Application Wrapper -->
  <div id="app">
    <div class="app-layout">
      
      <!-- Sidebar Panel (Home list, stats, search, fab) -->
      <aside class="sidebar" id="sidebarContainer">
        <!-- Rendered dynamically by HomeView -->
      </aside>

      <!-- Detail View Panel (Audio player, tabs: transcription, summary, chat) -->
      <main class="main-panel" id="detailContainer">
        <!-- Rendered dynamically by DetailView -->
      </main>

    </div>
  </div>

  <!-- JavaScript Services & Utilities -->
  <script src="js/utils.js?v=4"></script>
  <script src="js/models.js?v=4"></script>
  <script src="js/storage.js?v=4"></script>
  <script src="js/audio-service.js?v=4"></script>

  <script src="js/transcription.js?v=4"></script>
  <script src="js/ai-service.js?v=4"></script>

  <script src="js/views/tabs.js?v=4"></script>
  <script src="js/views/recording.js?v=4"></script>
  <script src="js/views/detail.js?v=4"></script>
  <script src="js/views/settings.js?v=4"></script>
  <script src="js/views/home.js?v=4"></script>
  <script src="js/views/auth.js?v=4"></script>

  <!-- JavaScript Main App Controller -->
  <script src="js/app.js?v=4"></script>

</body>
</html>
